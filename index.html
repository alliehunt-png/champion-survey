<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Champion Workshop — Feedback</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f4f0; --surface: #ffffff; --border: #e2e0d8;
    --text: #1c1b18; --muted: #8a8780; --accent: #2d6a4f;
    --accent-light: #e8f4ee; --accent-mid: #52b788; --danger: #c0392b;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
  header { width: 100%; padding: 1.1rem 2rem; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
  .logo { width: 26px; height: 26px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; }
  .logo svg { width: 13px; height: 13px; fill: white; }
  .header-title { font-size: 14px; font-weight: 500; }
  .header-sub { font-size: 12px; color: var(--muted); margin-top: 1px; }
  .progress { width: 100%; height: 2px; background: var(--border); }
  .progress-fill { height: 2px; background: var(--accent); transition: width 0.5s ease; width: 0%; }
  main { width: 100%; max-width: 560px; padding: 2.5rem 1.5rem 200px; flex: 1; display: flex; flex-direction: column; }
  .intro-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 2rem; text-align: center; }
  .intro-icon { width: 64px; height: 64px; background: var(--accent-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.25rem; }
  .intro-icon svg { width: 30px; height: 30px; stroke: var(--accent); fill: none; stroke-width: 1.5; }
  .intro-title { font-size: 20px; font-weight: 500; margin-bottom: 10px; }
  .intro-desc { font-size: 14px; color: var(--muted); line-height: 1.7; margin-bottom: 1.75rem; }
  .start-btn { background: var(--accent); color: white; border: none; border-radius: 100px; padding: 14px 36px; font-size: 15px; font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer; transition: opacity 0.15s; display: inline-flex; align-items: center; gap: 8px; }
  .start-btn:hover { opacity: 0.88; }
  .chat-area { display: flex; flex-direction: column; gap: 14px; }
  .msg { max-width: 90%; padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.65; animation: fadeUp 0.25s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .msg.bot { background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 4px; align-self: flex-start; color: var(--text); }
  .msg.user { background: var(--accent); color: white; border-bottom-right-radius: 4px; align-self: flex-end; font-style: italic; font-weight: 300; }
  .typing-wrap { align-self: flex-start; background: var(--surface); border: 1px solid var(--border); border-radius: 18px; border-bottom-left-radius: 4px; padding: 13px 16px; display: flex; gap: 5px; align-items: center; animation: fadeUp 0.2s ease; }
  .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--muted); animation: pulse 1.3s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%,60%,100%{opacity:0.3;transform:scale(1)} 30%{opacity:1;transform:scale(1.3)} }

  .voice-panel {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--surface); border-top: 1px solid var(--border);
    padding: 1.25rem 1.5rem 2rem;
    display: flex; flex-direction: column; align-items: center; gap: 14px;
  }
  .transcript-box {
    width: 100%; max-width: 560px; min-height: 40px;
    font-size: 14px; color: var(--muted); text-align: center;
    font-style: italic; line-height: 1.6; padding: 0 1rem;
  }
  .transcript-box.active { color: var(--text); font-style: normal; }

  .orb-wrap { display: flex; flex-direction: column; align-items: center; gap: 10px; }

  .orb {
    width: 64px; height: 64px; border-radius: 50%;
    background: var(--accent-light);
    border: 2px solid var(--accent-mid);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s ease;
    position: relative;
  }
  .orb.listening {
    background: var(--accent);
    border-color: var(--accent);
    animation: orbPulse 1.8s ease-in-out infinite;
  }
  .orb.speaking {
    background: #e8f0fe;
    border-color: #4285f4;
    animation: orbSpeak 1.2s ease-in-out infinite;
  }
  .orb.thinking {
    background: #fef9e7;
    border-color: #f39c12;
  }
  .orb svg { width: 26px; height: 26px; }
  .orb.listening svg { stroke: white; }
  .orb.speaking svg { stroke: #4285f4; }
  .orb svg { stroke: var(--accent); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

  @keyframes orbPulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(45,106,79,0.25); }
    50% { box-shadow: 0 0 0 14px rgba(45,106,79,0); }
  }
  @keyframes orbSpeak {
    0%,100% { box-shadow: 0 0 0 0 rgba(66,133,244,0.2); transform: scale(1); }
    50% { box-shadow: 0 0 0 10px rgba(66,133,244,0); transform: scale(1.04); }
  }

  .status-label { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; text-align: center; }

  .silence-bar-wrap {
    width: 100%; max-width: 200px; height: 3px;
    background: var(--border); border-radius: 2px; overflow: hidden;
  }
  .silence-bar { height: 3px; background: var(--accent); border-radius: 2px; width: 0%; transition: width 0.1s linear; }

  .summary-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 1.25rem; align-self: flex-start; width: 100%; max-width: 90%; animation: fadeUp 0.3s ease; margin-top: 4px; }
  .sum-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .sum-row:last-of-type { border-bottom: none; }
  .sum-label { color: var(--muted); flex-shrink: 0; }
  .sum-val { font-weight: 500; text-align: right; color: var(--text); max-width: 65%; }
  .save-status { font-size: 12px; margin-top: 10px; font-family: 'DM Mono', monospace; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .save-status.ok { color: var(--accent); }
  .save-status.err { color: var(--danger); }
  .sdot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  @media (max-width: 480px) { main { padding: 1.5rem 1rem 200px; } .msg { max-width: 96%; } }
</style>
</head>
<body>
<header>
  <div class="logo">
    <svg viewBox="0 0 16 16"><path d="M8 1L10.5 6H14L10.5 9.5L12 14L8 11L4 14L5.5 9.5L2 6H5.5Z"/></svg>
  </div>
  <div>
    <div class="header-title">Champion Workshop</div>
    <div class="header-sub">Voice feedback — anonymous</div>
  </div>
</header>
<div class="progress"><div class="progress-fill" id="pfill"></div></div>

<main>
  <div id="intro" class="intro-card">
    <div class="intro-icon">
      <svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
    </div>
    <div class="intro-title">Share your feedback</div>
    <div class="intro-desc">A quick voice conversation about the Champion workshop — about 3 minutes. Fully anonymous, completely hands-free. Just speak naturally when the interviewer asks a question.</div>
    <button class="start-btn" onclick="startInterview()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/></svg>
      Start interview
    </button>
  </div>
  <div class="chat-area" id="chat" style="display:none"></div>
</main>

<div class="voice-panel" id="vpanel" style="display:none">
  <div class="transcript-box" id="transcript">Waiting...</div>
  <div class="orb-wrap">
    <div class="orb" id="orb">
      <svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
    </div>
    <div class="silence-bar-wrap" id="silenceBarWrap" style="display:none">
      <div class="silence-bar" id="silenceBar"></div>
    </div>
  </div>
  <div class="status-label" id="statusLabel">Starting...</div>
</div>

<script>
const WEBHOOK = "https://script.google.com/macros/s/AKfycbwuvf2o6fmSCCW5hVsY_lb-MlrLS2ZGDfv0dNVwG34E_s0LCc_lzWu3r4d42vA0OeWV/exec";
const API = "https://api.anthropic.com/v1/messages";
const SYSTEM = `You are a friendly, casual interviewer collecting feedback after a sales training workshop called "Identifying Champions (MEDDICC)".

Your job is to have a natural, conversational debrief. Warm, direct, genuinely curious. Talk like a smart colleague, not a bot.

Cover these topics naturally:
1. Overall value (get a sense of 1-10)
2. Whether it was worth their time
3. Understanding of Champions vs Coaches before and after
4. Which parts worked best / worst (Presentation/level set, Individual Champion Analysis, Partner Scrutiny/Review, Group Debrief)
5. Single biggest takeaway
6. One thing they would change
7. Whether they feel more confident identifying Champions in deals
8. Any other thoughts

Rules:
- Ask ONE question at a time. Never stack questions.
- When someone gives a short or vague answer, probe once naturally before moving on.
- When someone gives a rich answer, acknowledge briefly and move forward.
- Keep responses SHORT — 1-3 sentences max. This is a conversation.
- No corporate language, filler phrases like "That's great!" or "Absolutely!"
- When you have covered all topics (roughly 8-10 turns), wrap up naturally and end with exactly: [DONE]
- Only include [DONE] in your very last message.`;

let history = [];
let recognition = null;
let isSpeaking = false;
let isListening = false;
let done = false;
let currentTranscript = "";
let silenceTimer = null;
let silenceStart = null;
const SILENCE_DELAY = 2200;

function scrollBottom() { setTimeout(() => window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" }), 80); }

function addMsg(text, cls) {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.textContent = text;
  chat.appendChild(div);
  scrollBottom();
}

function showTyping() {
  const chat = document.getElementById("chat");
  const d = document.createElement("div");
  d.id = "typ"; d.className = "typing-wrap";
  d.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  chat.appendChild(d); scrollBottom();
}

function removeTyping() { const t = document.getElementById("typ"); if (t) t.remove(); }
function setProgress(p) { document.getElementById("pfill").style.width = p + "%"; }
function setStatus(s) { document.getElementById("statusLabel").textContent = s; }
function setTranscript(t, active) {
  const el = document.getElementById("transcript");
  el.textContent = t || " ";
  el.className = "transcript-box" + (active ? " active" : "");
}

function setOrbState(state) {
  const orb = document.getElementById("orb");
  orb.className = "orb" + (state ? " " + state : "");
}

function startSilenceBar() {
  document.getElementById("silenceBarWrap").style.display = "block";
  silenceStart = Date.now();
  updateSilenceBar();
}

function updateSilenceBar() {
  if (!silenceStart) return;
  const elapsed = Date.now() - silenceStart;
  const pct = Math.min(100, (elapsed / SILENCE_DELAY) * 100);
  document.getElementById("silenceBar").style.width = pct + "%";
  if (pct < 100) requestAnimationFrame(updateSilenceBar);
}

function stopSilenceBar() {
  silenceStart = null;
  document.getElementById("silenceBarWrap").style.display = "none";
  document.getElementById("silenceBar").style.width = "0%";
}

function speak(text, onDone) {
  if (!window.speechSynthesis) { if (onDone) onDone(); return; }
  window.speechSynthesis.cancel();
  isSpeaking = true;
  stopListeningQuietly();
  setOrbState("speaking");
  setStatus("Interviewer speaking...");
  setTranscript("", false);

  const clean = text.replace("[DONE]", "").trim();
  const u = new SpeechSynthesisUtterance(clean);
  u.rate = 1.05; u.pitch = 1.0;

  const trySpeak = () => {
    const voices = window.speechSynthesis.getVoices();
    const pref = voices.find(v =>
      v.name.includes("Samantha") || v.name.includes("Karen") ||
      v.name.includes("Moira") || v.name.includes("Fiona") ||
      (v.lang && v.lang.startsWith("en") && v.localService)
    );
    if (pref) u.voice = pref;

    u.onend = () => {
      isSpeaking = false;
      if (onDone) onDone();
    };
    u.onerror = () => {
      isSpeaking = false;
      if (onDone) onDone();
    };
    window.speechSynthesis.speak(u);
  };

  const voices = window.speechSynthesis.getVoices();
  if (voices.length > 0) { trySpeak(); }
  else { window.speechSynthesis.onvoiceschanged = trySpeak; }
}

function setupRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { setStatus("Use Chrome for voice support."); return false; }

  recognition = new SR();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = "en-US";
  recognition.maxAlternatives = 1;

  recognition.onstart = () => {
    isListening = true;
    setOrbState("listening");
    setStatus("Listening...");
  };

  recognition.onresult = (e) => {
    if (isSpeaking) return;
    let interim = "", final = "";
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript + " ";
      else interim += e.results[i][0].transcript;
    }
    if (final) currentTranscript += final;
    const display = (currentTranscript + interim).trim();
    if (display) {
      setTranscript(display, true);
      resetSilenceTimer();
    }
  };

  recognition.onspeechstart = () => {
    if (isSpeaking) return;
    clearSilenceTimer();
    stopSilenceBar();
  };

  recognition.onspeechend = () => {
    if (isSpeaking || !currentTranscript.trim()) return;
    startSilenceTimer();
  };

  recognition.onerror = (e) => {
    if (e.error === "no-speech" || e.error === "aborted") return;
    if (e.error === "not-allowed") { setStatus("Mic access denied. Check browser settings."); return; }
  };

  recognition.onend = () => {
    isListening = false;
    if (!isSpeaking && !done) {
      setTimeout(() => {
        if (!isSpeaking && !done) startListening();
      }, 300);
    }
  };

  return true;
}

function startListening() {
  if (isSpeaking || done) return;
  if (!recognition && !setupRecognition()) return;
  currentTranscript = "";
  setTranscript("", false);
  stopSilenceBar();
  try { recognition.start(); } catch(e) {}
}

function stopListeningQuietly() {
  clearSilenceTimer();
  stopSilenceBar();
  isListening = false;
  try { recognition.abort(); } catch(e) {}
}

function startSilenceTimer() {
  clearSilenceTimer();
  startSilenceBar();
  silenceTimer = setTimeout(() => {
    const answer = currentTranscript.trim();
    if (answer) submitAnswer(answer);
  }, SILENCE_DELAY);
}

function resetSilenceTimer() {
  clearSilenceTimer();
  stopSilenceBar();
  if (currentTranscript.trim()) startSilenceTimer();
}

function clearSilenceTimer() {
  if (silenceTimer) { clearTimeout(silenceTimer); silenceTimer = null; }
}

function submitAnswer(answer) {
  stopListeningQuietly();
  setTranscript("", false);
  addMsg(answer, "user");
  currentTranscript = "";
  getAIResponse(answer);
}

async function getAIResponse(userMsg) {
  history.push({ role: "user", content: userMsg });
  setOrbState("thinking");
  setStatus("Thinking...");
  showTyping();
  const turns = history.filter(m => m.role === "user").length;
  setProgress(Math.min(90, (turns / 10) * 90));

  try {
    const res = await fetch(API, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1000, system: SYSTEM, messages: history })
    });
    const data = await res.json();
    const aiText = data.content?.[0]?.text || "Sorry, something went wrong.";
    history.push({ role: "assistant", content: aiText });
    removeTyping();
    addMsg(aiText.replace("[DONE]", "").trim(), "bot");
    const isDone = aiText.includes("[DONE]");

    speak(aiText, () => {
      if (isDone) {
        done = true;
        setProgress(100);
        setOrbState("");
        setStatus("Interview complete — thank you.");
        setTranscript("All done. Thanks for your time.", false);
        extractAndSave();
      } else {
        currentTranscript = "";
        startListening();
      }
    });
  } catch(err) {
    removeTyping();
    setOrbState("listening");
    setStatus("Error — please speak again");
    startListening();
  }
}

async function extractAndSave() {
  try {
    const transcript = history.map(m => (m.role === "user" ? "Rep" : "Interviewer") + ": " + m.content).join("\n\n");
    const res = await fetch(API, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: `Extract structured feedback from this interview transcript. Return ONLY a valid JSON object with these exact keys: value (number 1-10 or null), time_worth (string or null), before_understanding (number 1-5 or null), after_understanding (number 1-5 or null), best_component (string or null), weakest_component (string or null), key_takeaway (string or null), one_change (string or null), confidence (string or null), open_feedback (string or null). Use null for anything not mentioned. Keep strings under 200 chars. Return only the JSON object, nothing else.`,
        messages: [{ role: "user", content: transcript }]
      })
    });
    const data = await res.json();
    const raw = (data.content?.[0]?.text || "{}").replace(/```json|```/g, "").trim();
    const extracted = JSON.parse(raw);
    showSummary(extracted);
    await saveToSheet(extracted);
  } catch(err) {
    showSummary({});
  }
}

function showSummary(data) {
  const chat = document.getElementById("chat");
  const wrap = document.createElement("div"); wrap.className = "summary-wrap";
  const rows = [
    ["Overall value", data.value ? data.value + "/10" : null],
    ["Worth their time", data.time_worth],
    ["Understanding before", data.before_understanding ? data.before_understanding + "/5" : null],
    ["Understanding after", data.after_understanding ? data.after_understanding + "/5" : null],
    ["Most effective part", data.best_component],
    ["Needs most work", data.weakest_component],
    ["Key takeaway", data.key_takeaway],
    ["One change", data.one_change],
    ["Confidence change", data.confidence],
    ["Other feedback", data.open_feedback],
  ];
  rows.forEach(([label, val]) => {
    if (!val) return;
    const r = document.createElement("div"); r.className = "sum-row";
    r.innerHTML = `<span class="sum-label">${label}</span><span class="sum-val">${val}</span>`;
    wrap.appendChild(r);
  });
  const status = document.createElement("div");
  status.className = "save-status"; status.id = "save-status";
  status.innerHTML = '<span class="sdot"></span> Saving to Google Sheets...';
  wrap.appendChild(status);
  chat.appendChild(wrap);
  scrollBottom();
}

async function saveToSheet(data) {
  const el = document.getElementById("save-status");
  try {
    await fetch(WEBHOOK, { method: "POST", mode: "no-cors", headers: { "Content-Type": "application/json" }, body: JSON.stringify(data) });
    if (el) { el.className = "save-status ok"; el.innerHTML = '<span class="sdot"></span> Saved to Google Sheets'; }
  } catch(err) {
    if (el) { el.className = "save-status err"; el.innerHTML = '<span class="sdot"></span> Could not save'; }
  }
}

function startInterview() {
  document.getElementById("intro").style.display = "none";
  document.getElementById("chat").style.display = "flex";
  document.getElementById("vpanel").style.display = "flex";
  if (window.speechSynthesis) window.speechSynthesis.getVoices();
  showTyping();
  setStatus("Starting...");
  setOrbState("thinking");

  setTimeout(async () => {
    try {
      const res = await fetch(API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1000, system: SYSTEM, messages: [{ role: "user", content: "Start the interview now." }] })
      });
      const data = await res.json();
      const aiText = data.content?.[0]?.text || "Hey — thanks for doing this. Overall, how valuable did you find the Champion workshop, on a scale of one to ten?";
      history.push({ role: "assistant", content: aiText });
      removeTyping();
      addMsg(aiText, "bot");
      setProgress(5);
      speak(aiText, () => { startListening(); });
    } catch(err) {
      const fallback = "Hey — thanks for doing this. Overall, how valuable did you find the Champion workshop, on a scale of one to ten?";
      history.push({ role: "assistant", content: fallback });
      removeTyping();
      addMsg(fallback, "bot");
      speak(fallback, () => { startListening(); });
    }
  }, 400);
}
</script>
</body>
</html>
