<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Champion Workshop — Feedback</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f6f2;
    --surface: #ffffff;
    --border: #e4e2da;
    --text: #1a1917;
    --muted: #888580;
    --accent: #2d6a4f;
    --accent-light: #e8f4ee;
    --accent-text: #1b4332;
    --user-bg: #2d6a4f;
    --user-text: #ffffff;
    --bot-bg: #ffffff;
    --bot-border: #e4e2da;
    --tag-bg: #f0ede6;
    --tag-text: #5a5650;
    --scale-hover: #e8f4ee;
    --scale-selected: #2d6a4f;
    --scale-selected-text: #ffffff;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0;
  }

  header {
    width: 100%;
    padding: 1.25rem 2rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-mark {
    width: 28px;
    height: 28px;
    background: var(--accent);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-mark svg { width: 14px; height: 14px; fill: white; }

  .header-text { font-size: 14px; font-weight: 500; color: var(--text); }
  .header-sub { font-size: 12px; color: var(--muted); margin-top: 1px; }

  .progress-bar {
    width: 100%;
    height: 2px;
    background: var(--border);
  }
  .progress-fill {
    height: 2px;
    background: var(--accent);
    transition: width 0.5s ease;
    width: 0%;
  }

  main {
    width: 100%;
    max-width: 640px;
    padding: 2rem 1.5rem 6rem;
    flex: 1;
  }

  .chat-area {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .msg {
    max-width: 88%;
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.65;
    white-space: pre-wrap;
    animation: fadeUp 0.25s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.bot {
    background: var(--bot-bg);
    border: 1px solid var(--bot-border);
    border-bottom-left-radius: 4px;
    align-self: flex-start;
    color: var(--text);
  }

  .msg.user {
    background: var(--user-bg);
    color: var(--user-text);
    border-bottom-right-radius: 4px;
    align-self: flex-end;
  }

  .typing-bubble {
    background: var(--bot-bg);
    border: 1px solid var(--bot-border);
    border-bottom-left-radius: 4px;
    align-self: flex-start;
    padding: 14px 18px;
    border-radius: 16px;
    border-bottom-left-radius: 4px;
    display: flex;
    gap: 5px;
    align-items: center;
    animation: fadeUp 0.2s ease;
  }

  .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--muted);
    animation: pulse 1.3s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%,60%,100%{opacity:0.3;transform:scale(1)} 30%{opacity:1;transform:scale(1.2)} }

  .input-area {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 1rem 1.5rem 1.5rem;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .input-inner {
    width: 100%;
    max-width: 640px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .options-wrap {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .opt-btn {
    background: var(--tag-bg);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 8px 16px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    color: var(--tag-text);
    cursor: pointer;
    transition: all 0.15s;
    font-weight: 400;
  }

  .opt-btn:hover {
    background: var(--accent-light);
    border-color: var(--accent);
    color: var(--accent-text);
  }

  .scale-wrap {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
  }

  .scale-label {
    font-size: 11px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  .scale-btn {
    width: 38px;
    height: 38px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    font-size: 13px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    color: var(--text);
    transition: all 0.15s;
  }

  .scale-btn:hover {
    background: var(--scale-hover);
    border-color: var(--accent);
    color: var(--accent-text);
  }

  .text-input-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }

  .text-input-row textarea {
    flex: 1;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 14px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    resize: none;
    min-height: 60px;
    color: var(--text);
    background: var(--surface);
    outline: none;
    line-height: 1.5;
    transition: border-color 0.15s;
  }

  .text-input-row textarea:focus {
    border-color: var(--accent);
  }

  .send-btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 10px 18px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.15s;
    height: 42px;
  }

  .send-btn:hover { opacity: 0.88; }

  .skip-btn {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    height: 42px;
    transition: background 0.15s;
  }

  .skip-btn:hover { background: var(--tag-bg); }

  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.25rem;
    margin-top: 8px;
    align-self: flex-start;
    width: 100%;
    max-width: 88%;
    animation: fadeUp 0.25s ease;
  }

  .summary-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
    padding: 7px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }

  .summary-row:last-of-type { border-bottom: none; }

  .sum-label { color: var(--muted); flex-shrink: 0; }
  .sum-val { font-weight: 500; text-align: right; color: var(--text); }

  .status-line {
    font-size: 12px;
    color: var(--muted);
    margin-top: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'DM Mono', monospace;
  }

  .status-line.ok { color: var(--accent); }
  .status-line.err { color: #c0392b; }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
    flex-shrink: 0;
  }

  @media (max-width: 480px) {
    main { padding: 1.5rem 1rem 6rem; }
    .msg { max-width: 95%; font-size: 14px; }
    .scale-btn { width: 34px; height: 34px; font-size: 12px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-mark">
    <svg viewBox="0 0 16 16"><path d="M8 1L10.5 6H14L10.5 9.5L12 14L8 11L4 14L5.5 9.5L2 6H5.5Z"/></svg>
  </div>
  <div>
    <div class="header-text">Champion Workshop</div>
    <div class="header-sub">Session feedback — anonymous</div>
  </div>
</header>
<div class="progress-bar"><div class="progress-fill" id="pfill"></div></div>

<main>
  <div class="chat-area" id="chat"></div>
</main>

<div class="input-area">
  <div class="input-inner" id="iarea"></div>
</div>

<script>
const WEBHOOK = "https://script.google.com/macros/s/AKfycbwuvf2o6fmSCCW5hVsY_lb-MlrLS2ZGDfv0dNVwG34E_s0LCc_lzWu3r4d42vA0OeWV/exec";
const TOTAL = 10;
let step = 0;
let ans = {};

const qs = [
  {
    id: "value", type: "scale10",
    bot: "Hey — thanks for taking a few minutes to share feedback on the Champion workshop.\n\nOverall, how valuable did you find the session?\n\n1 = not at all valuable  →  10 = extremely valuable"
  },
  {
    id: "time_worth", type: "opts",
    bot: a => a.value >= 8 ? "Great. Was it a good use of your time?" : a.value <= 4 ? "Appreciate the honesty. Was it at least a reasonable use of your time?" : "Thanks. Was this a good use of your time?",
    opts: ["Definitely — highly effective", "Mostly yes, minor improvements needed", "Mostly no — could've been shorter or different", "Definitely not"]
  },
  {
    id: "before_understanding", type: "scale5",
    bot: "Before the session, how well did you understand Champions vs. Coaches?\n\n1 = barely  →  5 = very well"
  },
  {
    id: "after_understanding", type: "scale5",
    bot: a => a.before_understanding >= 4 ? "You already had a solid grasp going in. After the session — did your understanding improve?\n\n1 = barely  →  5 = very well" : "And after the session, how would you rate your understanding?\n\n1 = barely  →  5 = very well"
  },
  {
    id: "best_component", type: "opts",
    bot: "Which part of the workshop was most effective for you?",
    opts: ["Presentation (level set)", "Individual Champion analysis", "Partner scrutiny/review", "Group debrief"]
  },
  {
    id: "weakest_component", type: "opts",
    bot: "And which part could use the most improvement?",
    opts: ["Presentation (level set)", "Individual Champion analysis", "Partner scrutiny/review", "Group debrief", "All were good"]
  },
  {
    id: "key_takeaway", type: "text", followup: true,
    bot: "What's the single most important thing you're taking away from this session?"
  },
  {
    id: "one_change", type: "text", followup: true,
    bot: a => a.time_worth && a.time_worth.includes("not") ? "If you could change one thing to make it worth your time, what would it be?" : "If you could change one thing about the workshop, what would it be?"
  },
  {
    id: "confidence", type: "opts",
    bot: "Do you feel more confident identifying and leveraging Champions in your deals now?",
    opts: ["Much more confident", "Slightly more confident", "No change", "Less confident"]
  },
  {
    id: "open_feedback", type: "text", optional: true,
    bot: a => a.confidence && a.confidence.includes("Less") ? "What would have helped build that confidence instead?" : a.confidence && a.confidence.includes("No change") ? "What would have made this session more impactful for you?" : "Any other thoughts or suggestions for future workshops? (optional — feel free to skip)"
  }
];

function getBot(q) { return typeof q.bot === "function" ? q.bot(ans) : q.bot; }

function scrollToBottom() {
  setTimeout(() => window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" }), 80);
}

function addMsg(text, cls) {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.textContent = text;
  chat.appendChild(div);
  scrollToBottom();
  return div;
}

function showTyping() {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "typing-bubble";
  div.id = "typ";
  div.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  chat.appendChild(div);
  scrollToBottom();
}

function removeTyping() { const t = document.getElementById("typ"); if (t) t.remove(); }

function setProgress(s) {
  document.getElementById("pfill").style.width = Math.round((s / TOTAL) * 100) + "%";
}

function clearInput() { document.getElementById("iarea").innerHTML = ""; }

function next() {
  clearInput();
  if (step >= qs.length) { submitSurvey(); return; }
  showTyping();
  setTimeout(() => {
    removeTyping();
    addMsg(getBot(qs[step]), "bot");
    setProgress(step);
    renderInput(qs[step]);
  }, 650);
}

function record(id, val, display) {
  ans[id] = val;
  addMsg(display || String(val), "user");
  clearInput();
  step++;

  if (id === "key_takeaway" && val.length > 20) {
    setTimeout(() => {
      showTyping();
      setTimeout(() => {
        removeTyping();
        const probes = [
          "That's a useful one. Did anything specific in the session make that click for you?",
          "Good. Was that a new insight, or did the session reinforce something you already felt?"
        ];
        addMsg(probes[Math.floor(Math.random() * probes.length)], "bot");
        renderFollowup("key_takeaway_probe");
      }, 650);
    }, 200);
    return;
  }

  if (id === "one_change" && val.length > 20 && !val.toLowerCase().includes("nothing")) {
    setTimeout(() => {
      showTyping();
      setTimeout(() => {
        removeTyping();
        addMsg("Got it. Was that more about the content, the format, or the timing?", "bot");
        renderFollowup("one_change_probe");
      }, 650);
    }, 200);
    return;
  }

  setTimeout(next, 250);
}

function renderFollowup(pid) {
  const area = document.getElementById("iarea");
  area.innerHTML = "";
  const row = document.createElement("div"); row.className = "text-input-row";
  const ta = document.createElement("textarea"); ta.placeholder = "Your thoughts...";
  const btn = document.createElement("button"); btn.className = "send-btn"; btn.textContent = "Send";
  const go = () => {
    const v = ta.value.trim(); if (!v) return;
    ans[pid] = v; addMsg(v, "user"); clearInput();
    setTimeout(next, 250);
  };
  btn.onclick = go;
  ta.onkeydown = e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); go(); } };
  row.appendChild(ta); row.appendChild(btn); area.appendChild(row);
  ta.focus();
}

function renderInput(q) {
  const area = document.getElementById("iarea");
  area.innerHTML = "";

  if (q.type === "scale10" || q.type === "scale5") {
    const max = q.type === "scale10" ? 10 : 5;
    const wrap = document.createElement("div"); wrap.className = "scale-wrap";
    for (let i = 1; i <= max; i++) {
      const b = document.createElement("button"); b.className = "scale-btn"; b.textContent = i;
      b.onclick = () => record(q.id, i, String(i));
      wrap.appendChild(b);
    }
    area.appendChild(wrap);

  } else if (q.type === "opts") {
    const wrap = document.createElement("div"); wrap.className = "options-wrap";
    (q.opts || []).forEach(o => {
      const b = document.createElement("button"); b.className = "opt-btn"; b.textContent = o;
      b.onclick = () => record(q.id, o);
      wrap.appendChild(b);
    });
    area.appendChild(wrap);

  } else if (q.type === "text") {
    const row = document.createElement("div"); row.className = "text-input-row";
    const ta = document.createElement("textarea");
    ta.placeholder = q.optional ? "Optional — type here or skip" : "Type your answer...";
    const btn = document.createElement("button"); btn.className = "send-btn"; btn.textContent = "Send";
    const go = () => {
      const v = ta.value.trim(); if (!v && !q.optional) return;
      record(q.id, v || "(skipped)", v || "(skipped)");
    };
    btn.onclick = go;
    ta.onkeydown = e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); go(); } };
    row.appendChild(ta);
    if (q.optional) {
      const sk = document.createElement("button"); sk.className = "skip-btn"; sk.textContent = "Skip";
      sk.onclick = () => record(q.id, "(skipped)", "(skipped)");
      row.appendChild(sk);
    }
    row.appendChild(btn);
    area.appendChild(row);
    setTimeout(() => ta.focus(), 100);
  }
}

async function submitSurvey() {
  setProgress(TOTAL);
  clearInput();
  showTyping();
  setTimeout(async () => {
    removeTyping();
    addMsg("That's everything — thanks for being direct. Here's a summary of your responses:", "bot");

    const chat = document.getElementById("chat");
    const card = document.createElement("div"); card.className = "summary-card";

    const rows = [
      ["Overall value", ans.value + " / 10"],
      ["Good use of time", ans.time_worth],
      ["Understanding before", ans.before_understanding + " / 5"],
      ["Understanding after", ans.after_understanding + " / 5"],
      ["Most effective part", ans.best_component],
      ["Needs most work", ans.weakest_component],
      ["Key takeaway", ans.key_takeaway],
      ["One change", ans.one_change],
      ["Confidence change", ans.confidence],
      ["Other feedback", ans.open_feedback === "(skipped)" ? "—" : ans.open_feedback],
    ];

    rows.forEach(([label, val]) => {
      if (!val) return;
      const r = document.createElement("div"); r.className = "summary-row";
      r.innerHTML = `<span class="sum-label">${label}</span><span class="sum-val">${val}</span>`;
      card.appendChild(r);
    });

    const status = document.createElement("div"); status.className = "status-line";
    status.innerHTML = '<span class="status-dot"></span> Saving your response...';
    card.appendChild(status);
    chat.appendChild(card);
    scrollToBottom();

    try {
      await fetch(WEBHOOK, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(ans)
      });
      status.className = "status-line ok";
      status.innerHTML = '<span class="status-dot"></span> Saved — thank you.';
    } catch (err) {
      status.className = "status-line err";
      status.innerHTML = '<span class="status-dot"></span> Could not save. Please try again.';
    }
  }, 700);
}

next();
</script>
</body>
</html>
